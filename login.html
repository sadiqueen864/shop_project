<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | My Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: #008060; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .reg-link { display: block; margin-bottom: 20px; padding: 10px; background: #e6f3f0; color: #008060; text-decoration: none; border-radius: 6px; font-weight: 600; }
        .demo-box { background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px dashed #008060; font-size: 0.85rem; color: #555; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="login-card">
    <a href="#" class="reg-link" onclick="alert('Portfolio Demo: Registration feature is disabled. Please use the Demo Admin credentials below!')">New User? Create Account Here</a>

    <h2>Login</h2>
    <div id="error-msg" style="color: red; margin-bottom: 15px; display: none; font-size: 0.9rem;"></div>
    
    <div class="demo-box">
        <strong>Demo Admin Access:</strong><br>
        Email: <span style="color:#008060;">admin@store.com</span><br>
        Password: <span style="color:#008060;">admin123</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    
    <a href="index.html" style="display:block; margin-top:20px; color:#666; text-decoration:none;">← Back to Shop</a>
</div>

<script>
function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');

    if(email === 'admin@store.com' && pass === 'admin123') {
        // Successful mock login redirection
        window.location.href = 'admin/dashboard.html';
    } else {
        errorMsg.textContent = "Account nahi mila ya password ghalat hai! Demo details enter karein.";
        errorMsg.style.display = 'block';
    }
}
</script>

</body>
</html>
